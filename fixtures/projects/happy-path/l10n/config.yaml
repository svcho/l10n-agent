version: 1
source_locale: en
target_locales:
  - de
  - es
keys:
  case: dotted.lower
  max_depth: 4
  scopes:
    - onboarding
    - settings
  forbidden_prefixes:
    - tmp.
    - debug.
platforms:
  ios:
    path: ios/MyApp/Localizable.xcstrings
    key_transform: identity
  android:
    path: android/app/src/main/res/values/strings.xml
    key_transform: snake_case
provider:
  type: codex-local
  codex_min_version: 0.30.0
